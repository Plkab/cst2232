site_name: CST2232, Conception de Systèmes Temps Réel à base du microcontrôleur STM32F4
site_description: Cours de Master en Génie Logiciel Industriel
site_author: Ir Paul S. Kabidu
site_url: https://Plkab.github.io/cst2232

theme:
  name: material
  language: fr
  favicon: images/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
    - scheme: slate
      primary: indigo
      accent: cyan
  font:
    text: Roboto
    code: Roboto Mono
  features: []   # aucune navigation, juste le contenu

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables

plugins: []   # aucun plugin, pas de recherche, pas de TOC

nav:
  - Accueil: index.md
