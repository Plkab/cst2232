# Nom du site
site_name: Conception de Systèmes Temps Réel à base du microcontrôleur STM32F4
site_description: Cours Master Génie Logiciel Industriel
site_author: Paul S. Kabidu
site_url: https://Plkab.github.io/cst2232

# Configuration du thème
theme:
  name: material
  language: fr
  palette:
    # Mode clair
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/toggle-switch
        name: Mode sombre
    # Mode sombre
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/toggle-switch-off-outline
        name: Mode clair
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

# Extensions Markdown
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - footnotes
  - tables

# Plugins
plugins:
  - search
  - glightbox  # Pour les images zoomables

# Navigation (à compléter)
nav:
  - Présentation du Cours: index.md
  
  - Introduction aux Systèmes Temps Réels: rtos/index.md
  
  - Présentation du Microcontrôleur STM32F4 : mcu/index.md

  - Présentation des Périphériques: 
    - Le GPIO et les Interruptions Materielles: stm32f4/gpio/index.md
    - Le Timer et interruption: stm32f4/timer/index.md
    - L'acquisition analogique via ADC: stm32f4/adc/index.md
    - La Communication série USART: stm32f4/usart/index.md
    - La Communication série I2C: stm32f4/i2c/index.md
    - La Communication série SPI: stm32f4/spi/index.md
    - La Communication série CAN: stm32f4/can/index.md
    - Optimisation avec DMA: stm32f4/dma/index.md

  - Techniques de Programmation et Algorithmes: 
    - Machine d'Etat Fini (FSM): fsm/index.md
    - Contrôle Numérique avec PID: pid/index.md
    - Estimation d'Etat et Fusion Capteurs: estimation/index.md
    - Les Filtres Numériques: filtre/index.md
    - Analyse fréquentielle avec FFT: fft/index.md
    - La Synthèse Numérique Directe (DDS - Direct Digital Synthesis): dds/index.md
    - Les bases du graphisme embarqué: graphisme/index.md

  - Projets d'Application:
